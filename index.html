<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anana Photography | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f7f5f2; color: #3d3b3a; font-family: 'Georgia', serif; }
        /* A smoother, more serious transition */
        .luxury-transition { transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        #preloader { transition: opacity 1.5s ease-in-out; opacity: 1; }
        
        /* Breathing Animation for Preloader only */
        @keyframes breathe { 0%, 100% { opacity: 0.2; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; }
    </style>
</head>
<body>

    <div id="preloader" class="fixed inset-0 z-50 flex items-center justify-center bg-black">
        <h1 class="text-white text-xl md:text-5xl font-sans uppercase tracking-[0.3em] md:tracking-[0.5em] animate-breathe text-center px-4">
            Anana Photography
        </h1>
    </div>

    <script>
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            setTimeout(() => {
                preloader.style.opacity = '0';
                setTimeout(() => { preloader.style.display = 'none'; }, 1500); 
            }, 3500); 
        });
    </script>

    <nav class="absolute top-0 left-0 right-0 z-20 flex justify-between items-center p-6 md:px-16 text-white">
        <h1 class="text-lg md:text-xl font-bold tracking-tighter z-50"><a href="index.html">ANANA PHOTOGRAPHY</a></h1>
        
        <div class="hidden md:flex space-x-8 text-sm uppercase tracking-widest font-medium">
            <a href="index.html" class="underline underline-offset-4">Work</a>
            <a href="about.html" class="hover:underline underline-offset-4">About</a>
            <a href="contact.html" class="hover:underline underline-offset-4">Contact</a>
        </div>

        <button id="mobile-menu-button" class="md:hidden z-50 focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </nav>

    <div id="mobile-menu" class="hidden fixed inset-0 z-50 bg-black flex flex-col items-center justify-center space-y-8 text-white uppercase tracking-widest text-lg">
        <button id="close-menu-button" class="absolute top-6 right-6 focus:outline-none">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <a href="index.html" class="hover:text-stone-400">Work</a>
        <a href="about.html" class="hover:text-stone-400">About</a>
        <a href="contact.html" class="hover:text-stone-400">Contact</a>
    </div>

    <script>
        const btn = document.getElementById('mobile-menu-button');
        const closeBtn = document.getElementById('close-menu-button');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => { menu.classList.remove('hidden'); });
        closeBtn.addEventListener('click', () => { menu.classList.add('hidden'); });
    </script>

    <section class="relative w-full h-screen overflow-hidden flex flex-col justify-end md:justify-center items-center md:items-start px-6 md:pl-16 text-center md:text-left pb-24 md:pb-0">
        <img src="hero.jpg" class="absolute inset-0 w-full h-full object-cover z-0">
        <div class="absolute inset-0 bg-black/40 z-0"></div>

        <div class="relative z-10 text-white max-w-lg">
            <h2 class="text-3xl md:text-6xl font-light mb-8 tracking-tight leading-tight">Capturing Real <br> Moments <br> with Heart</h2>
            <a href="contact.html" class="inline-block border border-white px-8 py-3 uppercase tracking-[0.2em] text-xs hover:bg-white hover:text-black luxury-transition">
                Inquire for Booking
            </a>
        </div>

        <a href="#work" class="absolute bottom-10 z-10 text-white uppercase text-xs tracking-[0.3em] hover:opacity-100 opacity-60 animate-bounce">
            Scroll
        </a>
    </section>

    <section id="work" class="max-w-7xl mx-auto px-6 py-24">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 auto-rows-[300px] md:auto-rows-[400px]">
            <div class="relative group cursor-pointer md:col-span-2 md:row-span-2 overflow-hidden">
                <img src="wedding1.jpg" class="luxury-transition w-full h-full object-cover group-hover:scale-105">
                <div class="absolute inset-0 bg-black/40"></div>
                <div class="absolute inset-0 flex items-center justify-center"><h4 class="text-2xl md:text-4xl font-light tracking-[0.2em] text-white uppercase">Weddings</h4></div>
            </div>
            <div class="relative group cursor-pointer md:row-span-2 overflow-hidden">
                <img src="landscape1.jpg" class="luxury-transition w-full h-full object-cover group-hover:scale-105">
                <div class="absolute inset-0 bg-black/40"></div>
                <div class="absolute inset-0 flex items-center justify-center"><h4 class="text-2xl md:text-3xl font-light tracking-[0.2em] text-white uppercase">Landscapes</h4></div>
            </div>
            <div class="relative group cursor-pointer overflow-hidden">
                <img src="portrait1.jpg" class="luxury-transition w-full h-full object-cover group-hover:scale-105">
                <div class="absolute inset-0 bg-black/40"></div>
                <div class="absolute inset-0 flex items-center justify-center"><h4 class="text-xl md:text-2xl font-light tracking-[0.2em] text-white uppercase">Portraits</h4></div>
            </div>
            <div class="relative group cursor-pointer md:col-span-2 overflow-hidden">
                <img src="jewellery1.jpg" class="luxury-transition w-full h-full object-center object-cover group-hover:scale-105">
                <div class="absolute inset-0 bg-black/40"></div>
                <div class="absolute inset-0 flex items-center justify-center"><h4 class="text-xl md:text-2xl font-light tracking-[0.2em] text-white uppercase">Jewellery</h4></div>
            </div>
        </div>
    </section>

    <footer class="text-center py-12 bg-stone-100">
        <p class="text-stone-500 text-xs md:text-sm tracking-widest">© 2026 Tinussyy Design.</p>
    </footer>

</body>
</html>
